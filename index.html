  const safeKey = stateKey.replace(/[^a-zA-Z0-9]/g,'-');
  const lineEl = document.getElementById('li-'+safeKey+'-'+id);
  if (lineEl) {
    if (checked) lineEl.classList.add('paid');
    else lineEl.classList.remove('paid');
  }
};

window.updateLineItem = function(stateKey, id, field, value) {
  // Monthly tab: if stateKey is baseline but we're on monthly, promote to override
  if (state.activeTab === "monthly" && stateKey === "baseIncome") {
    const k = state.selectedMonth;
    if (!state.monthlyOverrides[k]) state.monthlyOverrides[k] = {};
    if (!state.monthlyOverrides[k].income) {
      state.monthlyOverrides[k].income = JSON.parse(JSON.stringify(state.baseIncome));
    }
    const item = state.monthlyOverrides[k].income.find(i => i.id === id);
    if (item) { item[field] = field==="amount" ? +value : value; }
    scheduleSave();
    clearTimeout(window._monthChartTimer);
    window._monthChartTimer = setTimeout(renderMonthly, 800);
    return;
  }
  if (state.activeTab === "monthly" && stateKey === "baseExpenses") {
    const k = state.selectedMonth;
    if (!state.monthlyOverrides[k]) state.monthlyOverrides[k] = {};
    if (!state.monthlyOverrides[k].expenses) {
      state.monthlyOverrides[k].expenses = JSON.parse(JSON.stringify(state.baseExpenses));
    }
    const item = state.monthlyOverrides[k].expenses.find(i => i.id === id);
    if (item) { item[field] = field==="amount" ? +value : value; }
    scheduleSave();
    clearTimeout(window._monthChartTimer);
    window._monthChartTimer = setTimeout(renderMonthly, 800);
    return;
  }
  // Default: direct edit on resolved array
  const arr = resolveStateKey(stateKey);
  if (!arr) return;
  const item = arr.find(i=>i.id===id);
  if (item) {
    item[field] = field==="amount"?+value:value;
    scheduleSave();
    // Refresh monthly charts if editing a monthly override directly
    if (state.activeTab === "monthly" && (stateKey.startsWith("mo-income:") || stateKey.startsWith("mo-expenses:"))) {
      clearTimeout(window._monthChartTimer);
      window._monthChartTimer = setTimeout(renderMonthly, 800);
    }
  }
};
window.removeLineItem = function(stateKey, id) {
  // Monthly view: handle both promoted (baseIncome/baseExpenses) and direct (mo-*) keys
  if (state.activeTab === "monthly") {
    const k = state.selectedMonth;
    if (stateKey === "baseIncome" || stateKey === `mo-income:${k}`) {
      if (!state.monthlyOverrides[k]) state.monthlyOverrides[k] = {};
      if (!state.monthlyOverrides[k].income) {
        state.monthlyOverrides[k].income = JSON.parse(JSON.stringify(state.baseIncome));
      }
      const arr = state.monthlyOverrides[k].income;
      const idx = arr.findIndex(i => i.id === id);
      if (idx > -1) arr.splice(idx, 1);
      scheduleSave(); renderMonthly();
      return;
    }
    if (stateKey === "baseExpenses" || stateKey === `mo-expenses:${k}`) {
      if (!state.monthlyOverrides[k]) state.monthlyOverrides[k] = {};
      if (!state.monthlyOverrides[k].expenses) {
        state.monthlyOverrides[k].expenses = JSON.parse(JSON.stringify(state.baseExpenses));
      }
      const arr = state.monthlyOverrides[k].expenses;
      const idx = arr.findIndex(i => i.id === id);
      if (idx > -1) arr.splice(idx, 1);
      scheduleSave(); renderMonthly();
      return;
    }
  }
  const arr = resolveStateKey(stateKey);
  if (!arr) return;
  const idx = arr.findIndex(i => i.id === id);
  if (idx > -1) arr.splice(idx, 1);
  scheduleSave(); renderAll();
};
function resolveStateKey(key) {
  if (key==="baseIncome") return state.baseIncome;
  if (key==="baseExpenses") return state.baseExpenses;
  if (key==="externalAssets") return state.externalAssets;
  if (key.startsWith("mo-income:")) { const k=key.split(":")[1]; return state.monthlyOverrides[k]?.income; }
  if (key.startsWith("mo-expenses:")) { const k=key.split(":")[1]; return state.monthlyOverrides[k]?.expenses; }
  if (key.startsWith("yb-income:")) { const k=key.split(":")[1]; return state.yearlyBases[k]?.income; }
  if (key.startsWith("yb-expenses:")) { const k=key.split(":")[1]; return state.yearlyBases[k]?.expenses; }
  return null;
}

  document.getElementById("tab-nav").innerHTML = tabDefs.map(t=>`<button class="tab-btn ${t.id===state.activeTab?"active":""}" onclick="switchTab('${t.id}')"><span>${t.icon}</span><span>${t.label}</span></button>`).join("");
  tabDefs.forEach(t=>{ document.getElementById("view-"+t.id).className="view-panel"+(t.id===state.activeTab?" active":""); });
}
window.switchTab = function(id) {
  state.activeTab=id;
  renderTabs();
  if (id==="dashboard") renderDashboard();
  else if (id==="monthly") renderMonthly();
  else if (id==="yearly") renderYearly();
  else if (id==="portfolio") renderPortfolio();
  else if (id==="retirement") renderRetirement();
  else if (id==="ai") renderAIAdvisor();
  else if (id==="settings") renderSettings();
};

function kpiHTML(label,value,subtitle,icon,accent) {
  return `<div class="kpi-card"><div class="kpi-icon" style="background:${accent}22;color:${accent}">${icon}</div><div><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${subtitle?`<div class="kpi-subtitle">${subtitle}</div>`:""}</div></div>`;
}

// ─── MOBILE CHART HELPERS ────────────────────────────────────────────
// Returns Chart.js option overrides optimised for mobile screens.
function getMobileChartOptions(base) {
  if (!isMobile()) return base;
  const mob = JSON.parse(JSON.stringify(base));
  // Legend: bottom, compact
  if (mob.plugins && mob.plugins.legend) {
    mob.plugins.legend.position = "bottom";
    mob.plugins.legend.labels = {
      ...(mob.plugins.legend.labels || {}),
      boxWidth: 10, boxHeight: 10, padding: 10,
      font: { size: 11, family: "DM Sans" }, color: "#94a3b8",
    };
  }
  // X axis: fewer ticks, no rotation
  if (mob.scales && mob.scales.x) {
    mob.scales.x.ticks = {
      ...(mob.scales.x.ticks || {}),
      maxTicksLimit: 4, maxRotation: 0,
      font: { size: 10, family: "JetBrains Mono" }, color: "#64748b",
    };
  }
  // Y axis: fewer ticks
  if (mob.scales && mob.scales.y) {
    mob.scales.y.ticks = {
      ...(mob.scales.y.ticks || {}),
      maxTicksLimit: 5,
      font: { size: 10, family: "JetBrains Mono" }, color: "#64748b",
    };
  }
  return mob;
}

            <span class="exp-total-col">${fmt(totalAnnual)}</span>
            <span class="exp-pct-col">100%</span>
          </div>
        </div>
      </div>`;
  } else {

      { name:"Expenses", value:Math.round(avgExpenses) },

    const pieLabelsEl = document.getElementById("pie-labels");
    if (pieLabelsEl) {
      pieLabelsEl.innerHTML = pieData.map((p,i) => {

        </div>`;
      }).join("");
    }
  }

  // Nest Egg Chart — per-source lines
  if (charts.nestegg) charts.nestegg.destroy();
  const ctx1 = document.getElementById("chart-nestegg").getContext("2d");
  const neColors = ["#6366f1","#f59e0b","#ec4899","#8b5cf6","#06b6d4","#f97316"];
  const isReal = state.nestEggReal;
  const deflate = (val, y) => isReal ? Math.round(val / Math.pow(1 + state.inflationRate/100, y)) : val;

  // Build per-asset year-by-year data
  const perAsset = state.externalAssets.map(a => {
    const gr = (a.growthRate ?? state.growthRate) / 100 / 12;
    let bal = a.balance;
    const vals = [];
    for (let y = 0; y <= ytr; y++) {
      const months = y === 0 ? (12 - CURRENT_MONTH) : 12;
      if (y === 0) { bal = a.balance * Math.pow(1+gr, months) + a.monthlyContribution * ((Math.pow(1+gr, months)-1)/(gr||1)); }
      else { bal = bal * Math.pow(1+gr, 12) + a.monthlyContribution * ((Math.pow(1+gr, 12)-1)/(gr||1)); }
      vals.push(deflate(Math.round(bal), y));
    }
    return { name: a.name || "(unnamed)", data: vals };
  });
  // App savings line
  const savingsLine = proj.map((p,i) => deflate(p.appSavings, i));

  const neDatasets = [

  const _neTtBd  = _neLight ? "#475569" : "#94a3b8";
  const _neTick  = _neLight ? "#475569" : "#64748b";
  charts.nestegg = new Chart(ctx1, { type:"line", data:{

  const savPct = income > 0 ? Math.min((savings / income) * 100, 100) : 0;
  const surplusPct = income > 0 ? Math.max((surplus / income) * 100, 0) : 0;
  const isDeficit = surplus < 0;
  return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:20px;align-items:center">

        <div style="width:${savPct.toFixed(1)}%;background:var(--amber);opacity:.9;transition:width .4s"></div>

      </div>
      <div style="display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text-muted)">
        <span><span style="color:var(--red)">■</span> Expenses ${income>0?(expPct.toFixed(0)+"%"):""}</span>
        <span><span style="color:var(--amber)">■</span> Savings ${income>0?(savPct.toFixed(0)+"%"):""}</span>
        <span><span style="color:var(--green)">■</span> Surplus ${income>0?(surplusPct.toFixed(0)+"%"):""}</span>

    </div>
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">INCOME</div>

        <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--red)">${fmt(expenses)}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">SAVINGS</div>

      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">${isDeficit?"DEFICIT":"LEFT TO SAVE"}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:${isDeficit?"var(--red)":"var(--green)"}">${isDeficit?"−":""}${fmt(Math.abs(surplus))}</div>
      </div>
    </div>
  </div>`;
}

// ─── YEARLY ──────────────────────────────────────────────────────────

// Standalone yearly line item updater — always reads state fresh, no closures
window.updateYearlyLineItem = function(field, id, prop, value) {
  const y = String(state.selectedYear);
  if (!state.yearlyBases[y]) state.yearlyBases[y] = { cascade: state.cascadeEnabled };
  // Promote to direct entry on first edit — copy from cascade base or baseline, NOT monthly overrides
  if (!state.yearlyBases[y][field]) {
    const sortedYears = Object.keys(state.yearlyBases).map(Number).sort((a,b)=>a-b);
    let cascadeBase = null;
    for (const cy of sortedYears) {
      if (cy < +y && state.yearlyBases[String(cy)]?.cascade) cascadeBase = state.yearlyBases[String(cy)];
    }
    const source = cascadeBase?.[field] || (field === "income" ? state.baseIncome : state.baseExpenses);
    state.yearlyBases[y][field] = JSON.parse(JSON.stringify(source));
  }
  const item = state.yearlyBases[y][field].find(i => i.id === id);
  if (item) { item[prop] = prop === "amount" ? +value : value; scheduleSave(); }
};

// Standalone yearly line item remover
window.removeYearlyLineItem = function(field, id) {
  const y = String(state.selectedYear);
  if (!state.yearlyBases[y]) return;
  const arr = state.yearlyBases[y][field];
  if (!arr) return;
  const idx = arr.findIndex(i => i.id === id);
  if (idx > -1) { arr.splice(idx, 1); scheduleSave(); renderYearly(); }
};

function renderYearly() {
  const yr = state.selectedYear;
  const yb = state.yearlyBases[String(yr)];
  // Sync cascade toggle to this year's saved setting when navigating years
  if (yb && yb.cascade !== undefined) state.cascadeEnabled = yb.cascade;
  else state.cascadeEnabled = false;

  // Find cascade base (most recent cascading year before this one, NOT including this year)
  const sorted = Object.keys(state.yearlyBases).map(Number).sort((a,b)=>a-b);
  let cascadeBase = null;
  for (const y of sorted) {
    if (y < yr && state.yearlyBases[String(y)]?.cascade) cascadeBase = state.yearlyBases[String(y)];
  }

  // Use yearly base directly — never use monthly overrides here
  // Priority: direct yearly entry > cascade base > baseline
  const incItems = yb?.income || cascadeBase?.income || state.baseIncome;
  const expItems = yb?.expenses || cascadeBase?.expenses || state.baseExpenses;
  const sav = yb?.savings ?? cascadeBase?.savings ?? state.baseSavings;

  const cur = state.currency;
  const sym = CURRENCY_SYMBOLS[cur];

  // Determine source label for badge
  let sourceLabel = "";
  if (yb?.income || yb?.expenses || yb?.savings !== undefined) {
    sourceLabel = yb.cascade ? "⚡ Cascading — applies to all subsequent years" : "📌 Pinned — only this year";
  } else if (cascadeBase) {
    sourceLabel = `📡 Inherited from ${sorted.filter(y => y < yr && state.yearlyBases[String(y)]?.cascade).pop()} (cascaded)`;
  }
  const cascadeBadge = sourceLabel ? `<div class="cascade-badge">${sourceLabel}</div>` : "";

  document.getElementById("view-yearly").innerHTML = `
    <div class="section-header"><h2>Yearly Forecast</h2><p>Set yearly base. Enable cascade to apply to all future years.</p></div>
    <div class="year-controls">
      <div class="year-selector"><button class="yr-btn" onclick="state.selectedYear=Math.max(${CURRENT_YEAR+1},state.selectedYear-1);renderYearly()">◀</button><span class="yr-display">${yr}</span><button class="yr-btn" onclick="state.selectedYear++;renderYearly()">▶</button></div>
      <label class="cascade-toggle"><input type="checkbox" ${state.cascadeEnabled?"checked":""} onchange="state.cascadeEnabled=this.checked;syncCascadeFlag();scheduleSave()"><span class="cascade-slider"></span><span class="cascade-label">Cascade to all future years</span></label>
    </div>
    ${cascadeBadge}
    <div class="detail-grid">
      <div class="detail-section"><h4>Yearly Income</h4><div id="yi-income"></div><button class="btn-add" onclick="addYearlyItem('income')">+ Add Income</button></div>
      <div class="detail-section"><h4>Yearly Expenses</h4><div id="yi-expenses"></div><button class="btn-add" onclick="addYearlyItem('expenses')">+ Add Expense</button></div>
      <div class="detail-section savings-section"><h4>Yearly Savings Target</h4><div class="savings-input-wrap"><span class="line-currency">${sym}</span><input type="number" class="savings-input" value="${Math.round(sav*EXCHANGE_RATES[cur])}" oninput="setYearlySavings(this.value)"></div></div>
    </div>
    ${cashflowSummaryHTML(sum(incItems,"amount"), sum(expItems,"amount"), sav)}`;

  renderYearlyLineItems("yi-income", incItems, "income");
  renderYearlyLineItems("yi-expenses", expItems, "expenses");
}

// Renders line items wired directly to updateYearlyLineItem / removeYearlyLineItem
function renderYearlyLineItems(containerId, items, field) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const cur = state.currency;
  const sym = CURRENCY_SYMBOLS[cur];
  const rate = EXCHANGE_RATES[cur];
  el.innerHTML = items.map(it => `

window.syncCascadeFlag = function() {
  const yr = String(state.selectedYear);
  if (state.yearlyBases[yr]) {
    state.yearlyBases[yr].cascade = state.cascadeEnabled;
    // If entry has no real data and cascade is being turned off, remove the stub entirely
    const yb = state.yearlyBases[yr];
    if (!yb.income && !yb.expenses && yb.savings === undefined && !state.cascadeEnabled) {
      delete state.yearlyBases[yr];
    }
  } else if (state.cascadeEnabled) {
    // Only create an entry if cascade is being turned ON
    state.yearlyBases[yr] = { cascade: true };
  }
  scheduleSave();
  // Update badge in place
  const badge = document.querySelector(".cascade-badge");
  const newLabel = state.cascadeEnabled
    ? "⚡ Cascading — applies to all subsequent years"
    : "📌 Pinned — only this year";
  if (badge) {
    badge.textContent = newLabel;
    if (!state.cascadeEnabled && !state.yearlyBases[yr]) badge.remove();
  } else if (state.cascadeEnabled) {
    const controls = document.querySelector(".year-controls");
    if (controls) {
      const div = document.createElement("div");
      div.className = "cascade-badge";
      div.textContent = newLabel;
      controls.insertAdjacentElement("afterend", div);
    }
  }
};
window.setYearlySavings = function(val) {
  const yr = String(state.selectedYear);
  if (!state.yearlyBases[yr]) state.yearlyBases[yr]={};
  state.yearlyBases[yr].savings = +val/EXCHANGE_RATES[state.currency];
  state.yearlyBases[yr].cascade = state.cascadeEnabled;
  scheduleSave();
};
window.addYearlyItem = function(field) {
  const yr = String(state.selectedYear);
  if (!state.yearlyBases[yr]) state.yearlyBases[yr]={cascade:state.cascadeEnabled};
  if (!state.yearlyBases[yr][field]) {
    const eff = getEffective(+yr, 0);
    state.yearlyBases[yr][field] = JSON.parse(JSON.stringify(field==="income"?eff.incomeItems:eff.expenseItems));
  }
  state.yearlyBases[yr][field].push({id:genId(),name:"",amount:0,type:field==="income"?"fixed":"variable"});
  scheduleSave(); renderYearly();
};

// ─── PORTFOLIO ───────────────────────────────────────────────────────
function renderPortfolio() {
  const teb = sum(state.externalAssets,"balance");
  const tec = sum(state.externalAssets,"monthlyContribution");
  const ytr = state.retirementAge - state.currentAge;
  const inflRate = state.inflationRate;
  const inflFactor = Math.pow(1 + inflRate/100, ytr);
  const projExt = state.externalAssets.reduce((s,a)=>s+futureValue(a.balance,a.monthlyContribution,(a.growthRate??state.growthRate),ytr),0);
  const realProjExt = projExt / inflFactor;
  const cur = state.currency;
  const sym = CURRENCY_SYMBOLS[cur];
  const rate = EXCHANGE_RATES[cur];

  const assetRows = state.externalAssets.map((a,idx)=>{
    const gr = a.growthRate ?? state.growthRate;
    const realGr = gr - inflRate;
    const projVal = futureValue(a.balance, a.monthlyContribution, gr, ytr);
    const realProjVal = projVal / inflFactor;
    return `<div class="asset-card">
      <div class="ac-header">
        <input class="asset-name" value="${esc(a.name)}" placeholder="Account Name" oninput="state.externalAssets[${idx}].name=this.value;scheduleSave()">
        <button class="line-remove" onclick="state.externalAssets.splice(${idx},1);scheduleSave();renderPortfolio()">×</button>
      </div>
      <div class="ac-fields">
        <div class="asset-field"><label>Current Balance</label><div class="line-amount-wrap"><span class="line-currency">${sym}</span><input type="number" value="${Math.round(a.balance*rate)}" oninput="state.externalAssets[${idx}].balance=this.value/${rate};scheduleSave()"></div></div>
        <div class="asset-field"><label>Monthly Contribution</label><div class="line-amount-wrap"><span class="line-currency">${sym}</span><input type="number" value="${Math.round(a.monthlyContribution*rate)}" oninput="state.externalAssets[${idx}].monthlyContribution=this.value/${rate};scheduleSave()"></div></div>
        <div class="asset-field"><label>Annual Growth Rate</label><div class="line-amount-wrap"><span class="line-currency">%</span><input type="number" step="0.5" value="${gr}" oninput="state.externalAssets[${idx}].growthRate=+this.value;scheduleSave();renderPortfolio()"></div></div>
      </div>
      <div class="ac-footer">
        <span class="ac-proj-label">Projected in ${ytr} yrs at ${gr}%:</span>
        <span class="ac-proj-value">${fmt(projVal)}</span>
      </div>
      <div class="ac-footer" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">
        <span class="ac-proj-label">In today's money (${realGr.toFixed(1)}% real):</span>
        <span class="ac-proj-value" style="color:#06b6d4">${fmt(realProjVal)}</span>
      </div>
    </div>`;
  }).join("");

  const weightedAvgRate = state.externalAssets.length > 0
    ? state.externalAssets.reduce((s,a)=> s + (a.growthRate ?? state.growthRate) * (a.balance || 1), 0) / state.externalAssets.reduce((s,a)=> s + (a.balance || 1), 0)
    : state.growthRate;
  const realWeightedAvg = weightedAvgRate - inflRate;

  document.getElementById("view-portfolio").innerHTML = `
    <div class="section-header"><h2>External Portfolio</h2><p>Track pensions, 401k, index funds alongside your app savings. Each account has its own growth rate.</p></div>
    <div class="portfolio-summary">
      ${kpiHTML("Total External Balance",fmt(teb),state.externalAssets.length+" accounts","◈","#6366f1")}
      ${kpiHTML("Total Monthly Contributions",fmt(tec),"Across all accounts","▲","#10b981")}
      ${kpiHTML("Projected (Nominal)",fmt(projExt),`${ytr} yrs · avg ${weightedAvgRate.toFixed(1)}% weighted`,"☀","#f59e0b")}
      ${kpiHTML("Projected (Today's Money)",fmt(realProjExt),`${inflRate}% inflation · ${realWeightedAvg.toFixed(1)}% real return`,"☀","#06b6d4")}
    </div>
    <div class="asset-cards">${assetRows}</div>
    <button class="btn-add wide" onclick="state.externalAssets.push({id:genId(),name:'',balance:0,monthlyContribution:0,growthRate:7});scheduleSave();renderPortfolio()">+ Add External Account</button>
    <div class="chart-card" style="margin-top:24px">
      <h3>Asset Growth (Today's Money)</h3>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">Each asset's projected value adjusted for ${inflRate}% inflation</p>
      <canvas id="chart-portfolio" height="160"></canvas>
    </div>`;

  // Build per-asset projection data adjusted for inflation
  const assetColors = ["#10b981","#6366f1","#f59e0b","#ec4899","#06b6d4","#8b5cf6","#f97316"];
  const assetProjections = state.externalAssets.map(a => {
    const gr = (a.growthRate ?? state.growthRate) / 100 / 12;
    const data = [];
    let balance = a.balance;
    for (let y = 0; y <= ytr; y++) {
      const inflDiv = Math.pow(1 + inflRate/100, y);
      if (y === 0) {
        const months = 12 - CURRENT_MONTH;
        balance = a.balance * Math.pow(1+gr, months) + a.monthlyContribution * ((Math.pow(1+gr, months)-1)/(gr||1));
      } else if (y > 0) {
        balance = balance * Math.pow(1+gr, 12) + a.monthlyContribution * ((Math.pow(1+gr, 12)-1)/(gr||1));
      }
      data.push(Math.round(balance / inflDiv));
    }
    return { name: a.name || "(unnamed)", data };

  // Labels: ages
  const ageLabels = [];
  for (let y = 0; y <= ytr; y++) ageLabels.push("Age " + (state.currentAge + y));
  // Filter to every 2nd + last for readability
  const showIdx = ageLabels.map((_,i) => i%2===0 || i===ageLabels.length-1 ? i : -1).filter(i=>i>=0);
  const filteredLabels = showIdx.map(i => ageLabels[i]);

  if (charts.portfolio) charts.portfolio.destroy();
  const ctx = document.getElementById("chart-portfolio")?.getContext("2d");
  if (ctx) {
    charts.portfolio = new Chart(ctx, { type:"line", data:{
      labels: filteredLabels,
      datasets: assetProjections.map((ap, i) => ({
        label: ap.name,
        data: showIdx.map(j => ap.data[j]),

        backgroundColor: assetColors[i % assetColors.length] + "22",

  }
}

// ─── RETIREMENT PLAN ─────────────────────────────────────────────────
// Scenario multipliers: lean=0.75, baseline=1.0, comfortable=1.3
const RET_SCENARIOS = { lean:0.75, baseline:1.0, comfortable:1.3 };

function getRetirementNumbers() {
  const scenario = state.retirementScenario || "baseline";
  const mult = RET_SCENARIOS[scenario];
  const ytr = state.retirementAge - state.currentAge;

  // Everything in TODAY'S money — expenses are entered in today's currency,
  // and we compare against the REAL (inflation-adjusted) nest egg so it's apples-to-apples.
  const retExpenses = (state.retirementExpenses || []);
  const totalToday = sum(retExpenses, "amount") * mult;

  // Use real nest egg (already deflated back to today's purchasing power)
  const proj = getProjectionData();
  const nestEgg = proj.length ? proj[proj.length-1].realTotal : 0;
  const nominalNestEgg = proj.length ? proj[proj.length-1].total : 0;

  // Tax gross-up: expenses are after-tax, so we need more gross withdrawal to cover them
  const taxRate = Math.min((state.retirementTaxRate ?? 0) / 100, 0.99);
  const grossNeeded = taxRate > 0 ? totalToday / (1 - taxRate) : totalToday;

  // Sustainable monthly in today's money (gross)
  const withdrawalRate = (state.retirementPostGrowthRate || 4) / 100;
  const sustainableMonthly = (nestEgg * withdrawalRate) / 12; // gross
  const sustainableAfterTax = sustainableMonthly * (1 - taxRate); // what you actually keep

  // Gap: compare after-tax income vs after-tax expenses
  const gap = sustainableAfterTax - totalToday;
  const coveragePct = totalToday > 0 ? (sustainableAfterTax / totalToday) * 100 : 100;

  // Verdict
  let verdict, verdictIcon, verdictClass;
  if (coveragePct >= 120) { verdict="Well Funded"; verdictIcon="✅"; verdictClass="overfunded"; }
  else if (coveragePct >= 95) { verdict="On Track"; verdictIcon="🎯"; verdictClass="ontarget"; }
  else if (coveragePct >= 75) { verdict="Slight Shortfall"; verdictIcon="⚠️"; verdictClass="underfunded"; }
  else { verdict="Underfunded"; verdictIcon="❌"; verdictClass="underfunded"; }

  // Drawdown runway: withdraw gross amount needed to cover after-tax expenses
  const postGrowth = (state.retirementPostGrowthRate || 4) / 100 / 12;
  const monthlyWithdrawal = grossNeeded; // gross withdrawal needed
  let balance = nestEgg, months = 0;
  let runwayData = [{ age: state.retirementAge, balance: nestEgg }];
  const lifeExp = state.retirementLifeExpectancy || 90;
  const maxMonths = (lifeExp - state.retirementAge) * 12 + 120;
  while (balance > 0 && months < maxMonths) {
    balance = balance * (1 + postGrowth) - monthlyWithdrawal;
    months++;
    if (months % 12 === 0) {
      const age = state.retirementAge + months / 12;
      runwayData.push({ age, balance: Math.max(0, Math.round(balance)) });
    }
  }
  const runoutAge = balance <= 0 ? state.retirementAge + months / 12 : null;

  return { totalToday, grossNeeded, nestEgg, nominalNestEgg, sustainableMonthly, sustainableAfterTax, gap, coveragePct, verdict, verdictIcon, verdictClass, ytr, runwayData, runoutAge, scenario, lifeExp, taxRate };
}

function renderRetirement() {
  const el = document.getElementById("view-retirement");
  if (!el) return;

  const cur = state.currency;
  const sym = CURRENCY_SYMBOLS[cur];
  const rate = EXCHANGE_RATES[cur];
  const nums = getRetirementNumbers();
  const retExp = state.retirementExpenses || [];

  // ── Expense rows ──
  const expRows = retExp.map((e, idx) => `
    <div class="ret-exp-row">
      <span class="ret-exp-icon">${e.icon||"💸"}</span>
      <input class="line-name" style="flex:1" value="${esc(e.name)}" placeholder="Expense name"
        onchange="state.retirementExpenses[${idx}].name=this.value;scheduleSave();renderRetirement()">
      <div class="line-amount-wrap">
        <span class="line-currency">${sym}</span>
        <input class="line-amount" type="number" value="${Math.round(e.amount*rate)}"
          onchange="state.retirementExpenses[${idx}].amount=this.value/${rate};scheduleSave();renderRetirement()">
      </div>
      <select class="line-type" onchange="state.retirementExpenses[${idx}].type=this.value;scheduleSave()">
        <option value="fixed" ${e.type==="fixed"?"selected":""}>Fixed</option>
        <option value="variable" ${e.type==="variable"?"selected":""}>Variable</option>
      </select>
      <button class="line-remove" onclick="state.retirementExpenses.splice(${idx},1);scheduleSave();renderRetirement()">×</button>
    </div>`).join("");

  // ── Bar chart for expense breakdown ──
  const totalExp = sum(retExp, "amount");
  const barItems = retExp.filter(e=>e.amount>0).map((e, i) => {
    const colors = ["var(--blue)","var(--green)","var(--violet)","var(--amber)","var(--pink)","var(--red)"];
    const pct = totalExp > 0 ? (e.amount / totalExp * 100).toFixed(1) : 0;
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px">
      <span style="width:18px;text-align:center">${e.icon||"💸"}</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="color:var(--text-secondary)">${esc(e.name)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted)">${fmt(e.amount)} <span style="color:${colors[i%colors.length]}">${pct}%</span></span>
        </div>
        <div style="height:6px;background:var(--bg-deep);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${colors[i%colors.length]};border-radius:3px"></div>
        </div>
      </div>
    </div>`;
  }).join("");

  // ── Runway chart data ──
  const runwayPoints = nums.runwayData;
  const maxBal = Math.max(...runwayPoints.map(p => p.balance), 1) * 1.1; // true max + 10% headroom
  const svgW = 600, svgH = 220, padL = 56, padR = 24, padT = 20, padB = 34;
  const innerW = svgW - padL - padR, innerH = svgH - padT - padB;
  const xScale = i => padL + (i / Math.max(runwayPoints.length - 1, 1)) * innerW;
  const yScale = v => padT + innerH - Math.max(0, Math.min(v, maxBal) / maxBal) * innerH;
  const pathD = runwayPoints.map((p,i) => `${i===0?"M":"L"}${xScale(i).toFixed(1)},${yScale(p.balance).toFixed(1)}`).join(" ");
  const fillD = pathD + ` L${xScale(runwayPoints.length-1).toFixed(1)},${(padT+innerH).toFixed(1)} L${padL},${(padT+innerH).toFixed(1)} Z`;

  // X-axis labels (every 5 years)
  const xLabels = runwayPoints.filter(p => p.age % 5 === 0).map(p => {

function buildFinancialContext() {
  const cur = state.currency;
  const ti = sum(state.baseIncome,"amount");
  const te = sum(state.baseExpenses,"amount");
  const surplus = ti - te - state.baseSavings;
  const savRate = ti>0 ? ((state.baseSavings/ti)*100).toFixed(1) : 0;
  const proj = getProjectionData();
  const nestEgg = proj.length ? proj[proj.length-1].total : 0;
  const ytr = state.retirementAge - state.currentAge;
  const extBal = state.externalAssets.reduce((s,a)=>s+a.balance,0);

  // ── 12-month rolling cash flow ──
  const monthly = getMonthlyData();
  const monthlyLines = monthly.map(m => {
    const disc = m.income - m.expenses - m.savings;
    const hasOv = !!state.monthlyOverrides[m.key];
    return `  ${m.label}: income=${fmt(m.income)}, expenses=${fmt(m.expenses)}, savings=${fmt(m.savings)}, surplus=${fmt(disc)}${hasOv?" [custom override]":""}`;
  }).join("\n");

  // ── Monthly overrides detail ──
  const ovKeys = Object.keys(state.monthlyOverrides);
  let overrideLines = "None";
  if (ovKeys.length > 0) {
    overrideLines = ovKeys.sort().map(k => {
      const ov = state.monthlyOverrides[k];
      const ovInc = ov.income ? sum(ov.income,"amount") : null;
      const ovExp = ov.expenses ? sum(ov.expenses,"amount") : null;
      const parts = [];
      if (ov.income) parts.push(`income=${fmt(ovInc)} (${ov.income.map(i=>`${i.name}: ${fmt(i.amount)}`).join(", ")})`);
      if (ov.expenses) parts.push(`expenses=${fmt(ovExp)} (${ov.expenses.map(e=>`${e.name}: ${fmt(e.amount)}`).join(", ")})`);
      if (ov.savings !== undefined) parts.push(`savings=${fmt(ov.savings)}`);
      return `  ${k}: ${parts.join(" | ")}`;
    }).join("\n");
  }

  // ── Yearly bases detail ──
  const ybKeys = Object.keys(state.yearlyBases);
  let yearlyLines = "None";
  if (ybKeys.length > 0) {
    yearlyLines = ybKeys.sort().map(y => {
      const yb = state.yearlyBases[y];
      const parts = [];
      if (yb.income) parts.push(`income=${fmt(sum(yb.income,"amount"))}`);
      if (yb.expenses) parts.push(`expenses=${fmt(sum(yb.expenses,"amount"))}`);
      if (yb.savings !== undefined) parts.push(`savings=${fmt(yb.savings)}`);
      if (yb.cascade) parts.push("cascades to future years");
      return `  ${y}: ${parts.join(" | ")}`;
    }).join("\n");
  }

  // ── Projection milestones ──
  const milestones = proj.filter((_,i) => i===0 || i===proj.length-1 || proj[i].age % 5 === 0)
    .map(p => `  Age ${p.age} (${p.year}): nest egg=${fmt(p.total)}, real=${fmt(p.realTotal)}, yearly contrib=${fmt(p.yearlyContrib)}`)
    .join("\n");

  return `You are a personal financial advisor AI embedded in the "Future Forecast" financial planning app.
Here is the user's COMPLETE financial data (all values in ${cur}):

━━ BASELINE (default every month) ━━
- Income: ${fmt(ti)} total — ${state.baseIncome.map(i=>`${i.name} ${fmt(i.amount)} (${i.type})`).join(", ")||"none"}
- Expenses: ${fmt(te)} total — ${state.baseExpenses.map(e=>`${e.name} ${fmt(e.amount)} (${e.type})`).join(", ")||"none"}
- Monthly Savings Target: ${fmt(state.baseSavings)}
- Monthly Surplus: ${fmt(surplus)} | Savings Rate: ${savRate}%

━━ 12-MONTH CASH FLOW (current + next 12 months) ━━
${monthlyLines}

━━ MONTHLY OVERRIDES (months that differ from baseline) ━━
${overrideLines}

━━ YEARLY FORECAST BASES ━━
${yearlyLines}

━━ RETIREMENT & PROJECTIONS ━━
- Current Age: ${state.currentAge} | Retirement Age: ${state.retirementAge} | ${ytr} years away
- Growth Rate: ${state.growthRate}% | Inflation: ${state.inflationRate}% | Real growth: ${(state.growthRate-state.inflationRate).toFixed(1)}%
- Projected Nest Egg at Retirement: ${fmt(nestEgg)} (real: ${fmt(proj.length?proj[proj.length-1].realTotal:0)})
- 4% Rule monthly income at retirement: ${fmt(Math.round(nestEgg*0.04/12))}

Projection milestones:
${milestones}

━━ EXTERNAL PORTFOLIO ━━
- Total Balance: ${fmt(extBal)}
${state.externalAssets.length>0 ? state.externalAssets.map(a=>`- ${a.name||"Asset"}: balance=${fmt(a.balance)}, monthly contrib=${fmt(a.monthlyContribution)}, growth=${a.growthRate}%`).join("\n") : "- No external assets added"}

━━ RETIREMENT EXPENSE FORECAST ━━
${(()=>{
  const retExp = state.retirementExpenses||[];
  const totalToday = sum(retExp,"amount");
  const proj = getProjectionData();
  const realNestEgg = proj.length?proj[proj.length-1].realTotal:0;
  const withdrawalRate = (state.retirementPostGrowthRate||4)/100;
  const taxRate = Math.min((state.retirementTaxRate ?? 0)/100, 0.99);
  const sustainableGross = (realNestEgg*withdrawalRate)/12;
  const sustainableAfterTax = sustainableGross*(1-taxRate);
  const grossNeeded = taxRate>0 ? totalToday/(1-taxRate) : totalToday;
  const gap = sustainableAfterTax - totalToday;
  return `- Retirement expenses (today's money): ${fmt(totalToday)}/mo (${retExp.map(e=>`${e.name}: ${fmt(e.amount)}`).join(", ")||"none set"})
- Real nest egg at retirement (today's purchasing power): ${fmt(realNestEgg)}
- Gross sustainable withdrawal: ${fmt(sustainableGross)}/mo at ${state.retirementPostGrowthRate||4}% rate
- Effective retirement tax rate: ${state.retirementTaxRate ?? 0}%
- After-tax sustainable income: ${fmt(sustainableAfterTax)}/mo
- Gross withdrawal needed to cover expenses: ${fmt(grossNeeded)}/mo
- Monthly gap (after tax): ${gap>=0?"surplus":"shortfall"} of ${fmt(Math.abs(gap))}
- Life expectancy set to: ${state.retirementLifeExpectancy||90}
- Retirement scenario: ${state.retirementScenario||"baseline"}`;
})()}

Provide concise, actionable, friendly financial advice. Use markdown formatting (bold, bullet lists) for clarity.
You have FULL visibility of all months, overrides, and projections — reference specific months and numbers when relevant.
Be encouraging but realistic. Keep responses under 350 words unless the user asks for detail.`;
}

async function callAIProvider(messages) {
  const prov = aiState.provider;
  const key = aiState.apiKeys[prov];
  if (!key) throw new Error(`No API key set for ${AI_PROVIDERS[prov].name}. Please enter your key above.`);

  const systemMsg = aiState.includeFinancialContext ? buildFinancialContext() : "You are a helpful financial advisor AI.";

  if (prov === "claude") {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({
        model: AI_PROVIDERS.claude.models.default,
        max_tokens: 1024,
        system: systemMsg,
        messages: messages.map(m=>({ role:m.role==="bot"?"assistant":m.role, content:m.content }))
      })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Claude API error: ${res.status}`);
    return d.content?.[0]?.text || "";
  }

  if (prov === "openai") {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
      body: JSON.stringify({
        model: AI_PROVIDERS.openai.models.default,
        max_tokens: 1024,
        messages: [
          { role:"system", content:systemMsg },
          ...messages.map(m=>({ role:m.role==="bot"?"assistant":m.role, content:m.content }))
        ]
      })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `OpenAI API error: ${res.status}`);
    return d.choices?.[0]?.message?.content || "";
  }

  if (prov === "gemini") {
    const geminiMessages = messages.map(m=>({
      role: m.role==="bot" ? "model" : "user",
      parts:[{text: m.content}]
    }));

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${AI_PROVIDERS.gemini.models.default}:generateContent?key=${key}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        system_instruction: { parts:[{text:systemMsg}] },
        contents: geminiMessages,
        generationConfig: { maxOutputTokens:1024 }
      })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Gemini API error: ${res.status}`);
    return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
  }
}

function markdownToHTML(text) {
  const lines = text.split("\n");
  let html = "";
  let i = 0;
  let inList = false;

  const inlineFormat = (s) => s
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code style='background:rgba(255,255,255,0.12);padding:1px 6px;border-radius:3px;font-family:monospace;font-size:12px'>$1</code>");

  const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };

  while (i < lines.length) {
    const line = lines[i];

    // Detect table block: line with pipes and next line is separator (---|---)
    if (/\|/.test(line) && i+1 < lines.length && /^\|?[\s\-:]+(\|[\s\-:]+)+\|?$/.test(lines[i+1])) {
      closeList();
      // Collect all table rows
      const headers = line.split("|").map(c=>c.trim()).filter((_,idx,arr)=>idx>0&&idx<arr.length-1||arr.length===1);
      i += 2; // skip separator
      let rows = [];
      while (i < lines.length && /\|/.test(lines[i])) {
        rows.push(lines[i].split("|").map(c=>c.trim()).filter((_,idx,arr)=>idx>0&&idx<arr.length-1||arr.length===1));
        i++;
      }
      html += `<div style="overflow-x:auto;margin:10px 0"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr>${headers.map(h=>`<th style="padding:7px 12px;text-align:left;border-bottom:2px solid rgba(255,255,255,0.15);color:var(--text-muted);font-weight:600;white-space:nowrap">${inlineFormat(h)}</th>`).join("")}</tr></thead>
        <tbody>${rows.map((row,ri)=>`<tr style="background:${ri%2===0?"rgba(255,255,255,0.03)":"transparent"}">${row.map(cell=>`<td style="padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.07);white-space:nowrap">${inlineFormat(cell)}</td>`).join("")}</tr>`).join("")}</tbody>
      </table></div>`;
      continue;
    }

    // Horizontal rule
    if (/^---+$/.test(line.trim())) {
      closeList();
      html += `<hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0">`;
      i++; continue;
    }

    // Headings
    const h3 = line.match(/^### (.+)/);
    const h2 = line.match(/^## (.+)/);
    const h1 = line.match(/^# (.+)/);
    if (h1||h2||h3) {
      closeList();
      const lvl = h1?1:h2?2:3;
      const content = (h1||h2||h3)[1];
      const sizes = ["17px","15px","14px"];
      html += `<p style="font-size:${sizes[lvl-1]};font-weight:700;margin:12px 0 4px;color:var(--text-primary)">${inlineFormat(content)}</p>`;
      i++; continue;
    }

    // Bullet list items
    const bullet = line.match(/^[-•*] (.+)/);
    if (bullet) {
      if (!inList) { html += `<ul style="padding-left:18px;margin:6px 0">`; inList = true; }
      html += `<li style="margin-bottom:4px">${inlineFormat(bullet[1])}</li>`;
      i++; continue;
    }

    // Numbered list
    const numbered = line.match(/^(\d+)\. (.+)/);
    if (numbered) {
      closeList();
      // collect all numbered items
      let items = [];
      while (i < lines.length && lines[i].match(/^\d+\. /)) {
        items.push(lines[i].match(/^\d+\. (.+)/)[1]);
        i++;
      }
      html += `<ol style="padding-left:20px;margin:6px 0">${items.map(it=>`<li style="margin-bottom:4px">${inlineFormat(it)}</li>`).join("")}</ol>`;
      continue;
    }

    // Empty line = paragraph break
    if (line.trim() === "") {
      closeList();
      html += `<div style="height:8px"></div>`;
      i++; continue;
    }

    // Regular paragraph line
    closeList();
    html += `<p style="margin:3px 0;line-height:1.6">${inlineFormat(line)}</p>`;
    i++;
  }

  closeList();
  return html;
}

  renderAIMessages();

  // Clear input

  }
  aiState.isTyping = false;

}

window.handleImportFile = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Basic validation — check it has expected keys
      if (!imported.baseIncome || !imported.baseExpenses) {
        alert("This doesn't look like a valid Future Forecast backup file.");
        return;
      }
      if (!confirm(`Import backup from "${file.name}"? This will replace all your current data.`)) return;
      Object.assign(state, imported);
      cleanupStubYearlyBases();
      scheduleSave();
      applyTheme();
      renderAll();
      showSave("saved");
      setTimeout(()=>showSave(""),2000);
    } catch(err) {
      alert("Failed to read backup file: " + err.message);
    }
    // Reset input so the same file can be re-imported if needed
    event.target.value = "";
  };
  reader.readAsText(file);
};

};

// Hook into renderTabs so mobile nav stays in sync
const _origRenderTabs = window.renderTabs || function(){};
window.renderTabs = function() {
  _origRenderTabs();
  renderMobileNav();
};

// Initialise on load and on resize
document.addEventListener("DOMContentLoaded", () => {
  setTimeout(renderMobileNav, 900); // after main app init
});
window.addEventListener("resize", renderMobileNav);
// ─── END MOBILE BOTTOM NAV ───────────────────────────────────────────────────
</script>
</body>
</html>
